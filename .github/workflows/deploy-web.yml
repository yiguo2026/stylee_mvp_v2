name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build web
        run: |
          CLI=$(find node_modules -path "*/expo/bin/cli" -type f | head -1)
          if [ -z "$CLI" ]; then
            CLI=$(find node_modules -path "*/@expo/cli/build/bin/cli" -type f | head -1)
          fi
          if [ -z "$CLI" ]; then
            echo "Cannot find expo CLI" && exit 1
          fi
          echo "Using CLI: $CLI"
          node "$CLI" export --platform web

      - name: Deploy to yiguo2026.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: yiguo2026/yiguo2026.github.io
          publish_branch: main
          publish_dir: ./dist
          force_orphan: true
