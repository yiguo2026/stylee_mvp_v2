name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build web
        run: npm run build:web
        env:
          EXPO_PUBLIC_DEEPSEEK_KEY: ${{ secrets.EXPO_PUBLIC_DEEPSEEK_KEY }}
          EXPO_PUBLIC_DEEPSEEK_HOST: ${{ secrets.EXPO_PUBLIC_DEEPSEEK_HOST }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SUPABASE_SERVICE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_SERVICE_KEY }}
          EXPO_PUBLIC_DASHSCOPE_API_KEY: ${{ secrets.EXPO_PUBLIC_DASHSCOPE_API_KEY }}

      - name: Deploy to yiguo2026.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: yiguo2026/yiguo2026.github.io
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
