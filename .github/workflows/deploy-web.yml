name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block server secrets from Expo bundles
        run: |
          if git grep -nE 'EXPO_PUBLIC_(DEEPSEEK|DASHSCOPE|ARK|SUPABASE_SERVICE)' -- . ':!docs/**' ':!.github/workflows/deploy-web.yml'; then
            echo 'Server credentials must never use EXPO_PUBLIC_* variables.'
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate deploy env
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_STYLEE_API: ${{ vars.EXPO_PUBLIC_STYLEE_API }}
          EXPO_PUBLIC_QWEATHER_KEY: ${{ secrets.EXPO_PUBLIC_QWEATHER_KEY || vars.EXPO_PUBLIC_QWEATHER_KEY }}
          EXPO_PUBLIC_QWEATHER_HOST: ${{ secrets.EXPO_PUBLIC_QWEATHER_HOST || vars.EXPO_PUBLIC_QWEATHER_HOST }}
        run: |
          missing=()
          for key in EXPO_PUBLIC_SUPABASE_URL EXPO_PUBLIC_SUPABASE_ANON_KEY EXPO_PUBLIC_STYLEE_API; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub Actions secrets/vars: ${missing[*]}"
            exit 1
          fi

      - name: Build web
        run: npm run build:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_STYLEE_API: ${{ vars.EXPO_PUBLIC_STYLEE_API }}
          EXPO_PUBLIC_QWEATHER_KEY: ${{ secrets.EXPO_PUBLIC_QWEATHER_KEY || vars.EXPO_PUBLIC_QWEATHER_KEY }}
          EXPO_PUBLIC_QWEATHER_HOST: ${{ secrets.EXPO_PUBLIC_QWEATHER_HOST || vars.EXPO_PUBLIC_QWEATHER_HOST }}

      - name: Deploy to yiguo2026.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: yiguo2026/yiguo2026.github.io
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
